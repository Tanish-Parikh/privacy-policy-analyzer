<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Privacy Policy Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- Ambient background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <!-- Top bar -->
  <div class="topbar">
    <img src="logo.png" alt="Logo" class="topbar-logo">
    <span class="topbar-title">Privacy Analyzer</span>
    <button id="theme-toggle" class="theme-toggle" title="Toggle Light/Dark Mode">
      <svg id="sun-icon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <!-- Gauge -->
  <div class="gauge-wrap">
    <svg viewBox="0 0 200 120" class="gauge-svg">
      <!-- Track -->
      <path id="arc-track" d="M20 100 A80 80 0 0 1 180 100" stroke="rgba(255,255,255,0.06)" stroke-width="14" fill="none"
        stroke-linecap="round" />
      <!-- Glow duplicate -->
      <path id="arc-glow" d="M20 100 A80 80 0 0 1 180 100" stroke="#7c3aed" stroke-width="20" fill="none"
        stroke-linecap="round" stroke-dasharray="251" stroke-dashoffset="251" opacity="0" filter="url(#glow)" />
      <!-- Arc -->
      <path id="arc" d="M20 100 A80 80 0 0 1 180 100" stroke="url(#arcGrad)" stroke-width="14" fill="none"
        stroke-linecap="round" stroke-dasharray="251" stroke-dashoffset="251" opacity="0" />
      <!-- Defs -->
      <defs>
        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#f43f5e" />
          <stop offset="50%" stop-color="#a855f7" />
          <stop offset="100%" stop-color="#06b6d4" />
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="5" result="coloredBlur" />
          <feMerge>
            <feMergeNode in="coloredBlur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
    </svg>
    <div class="score-container">
      <div id="score" class="score">--</div>
      <div class="score-label">/ 100</div>
    </div>
  </div>

  <!-- Readability label + grade -->
  <div class="trust">Readability Score</div>
  <div id="gradeLabel" class="grade-label">—</div>

  <!-- Privacy Risk Score Panel -->
  <div id="risk-panel" class="risk-panel hidden">
    <div class="risk-panel-row">
      <div class="risk-panel-left">
        <span class="risk-panel-label">Privacy Risk Score</span>
        <span id="risk-category" class="risk-category-badge">—</span>
      </div>
      <div class="risk-panel-right">
        <span id="risk-pct" class="risk-pct-value">—</span>
        <span class="risk-pct-unit">%</span>
      </div>
    </div>
    <div class="risk-bar-track">
      <div id="risk-bar-fill" class="risk-bar-fill"></div>
    </div>
  </div>

  <!-- Section Divider -->
  <div class="section-divider"></div>

  <!-- Tabs + Filter -->
  <div class="tabs-row">
    <div class="tabs">
      <button id="all" class="tab-btn active">
        <span class="tab-icon">✦</span> All
      </button>
      <button id="summary" class="tab-btn">
        <span class="tab-icon">📊</span> Summary
      </button>
      <button id="share" class="tab-btn">
        <span class="tab-icon">⇄</span> Sharing
      </button>
    </div>
    <!-- Filter button -->
    <div class="filter-wrap">
      <button id="filter-btn" class="filter-btn" title="Filter by risk level">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6" />
          <line x1="7" y1="12" x2="17" y2="12" />
          <line x1="10" y1="18" x2="14" y2="18" />
        </svg>
      </button>
      <!-- Dropdown checklist -->
      <div id="filter-dropdown" class="filter-dropdown hidden">
        <div class="filter-title">Filter by Risk</div>
        <label class="filter-item">
          <input type="checkbox" id="chk-high" checked> <span class="risk-dot high-dot"></span> High Risk
        </label>
        <label class="filter-item">
          <input type="checkbox" id="chk-medium" checked> <span class="risk-dot medium-dot"></span> Medium Risk
        </label>
        <label class="filter-item">
          <input type="checkbox" id="chk-low" checked> <span class="risk-dot low-dot"></span> Low Risk
        </label>
      </div>
    </div>
  </div>

  <!-- Summary View (Hidden by default) -->
  <div id="summary-view" class="summary-card hidden">
    <div class="summary-top">
      <div class="summary-desc">
        <h3>Policy Overview</h3>
        <p id="summary-text">Click analyze to see the summary.</p>
      </div>
      <div class="risk-chart-container">
        <div id="risk-chart" class="risk-chart"></div>
      </div>
    </div>
    <div id="risk-legend" class="risk-legend">
      <!-- Legend items injected via JS -->
    </div>

    <!-- New: Recommendation Section -->
    <div id="recommendation-section" class="recommendation-section hidden">
      <div class="rec-card">
        <div class="rec-icon" id="rec-icon">✅</div>
        <div class="rec-content">
          <div class="rec-title" id="rec-title">Recommended to Accept</div>
          <div class="rec-desc" id="rec-desc">This policy aligns with standard privacy practices.</div>
        </div>
      </div>
    </div>

    <!-- New: Detailed Risks Section -->
    <div id="detailed-risks-section" class="detailed-risks-section hidden">
      <h4 class="section-title">Potential Data Risks</h4>
      <div id="detailed-risks-list" class="detailed-risks-list">
        <!-- Injected via JS -->
      </div>
    </div>
  </div>

  <!-- Cards -->
  <div id="cards" class="cards"></div>

  <!-- Bottom bar -->
  <div class="bottom">
    <span id="caution" class="caution hidden">
      <span class="caution-dot"></span><span id="caution-text">Use with caution</span>
    </span>
  </div>

  <!-- Analyze button -->
  <button id="analyze" class="analyze">
    <span class="analyze-icon">🔍</span>
    Analyze Policy
  </button>

  <script src="popup.js"></script>
</body>

</html>
